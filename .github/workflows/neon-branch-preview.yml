name: Neon Branch Preview (Database per PR)

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

# Required for schema diff comments
permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  setup:
    name: Setup
    outputs:
      branch: ${{ steps.branch_name.outputs.current_branch }}
    runs-on: ubuntu-latest
    steps:
      - name: Get branch name
        id: branch_name
        uses: tj-actions/branch-names@v8

  create_neon_branch:
    name: Create Neon Branch & Run Migrations
    outputs:
      db_url: ${{ steps.create_neon_branch.outputs.db_url }}
      db_url_with_pooler: ${{ steps.create_neon_branch.outputs.db_url_with_pooler }}
    needs: setup
    if: |
      github.event_name == 'pull_request' && (
      github.event.action == 'synchronize'
      || github.event.action == 'opened'
      || github.event.action == 'reopened')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get branch expiration date (2 weeks from now)
        id: get_expiration_date
        run: echo "EXPIRES_AT=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Create Neon Branch
        id: create_neon_branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ env.EXPIRES_AT }}

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run Database Migrations
        run: |
          echo "Running migrations on preview database..."

          # Migration 1: Create tables
          psql "${{ steps.create_neon_branch.outputs.db_url }}" -f schema/01-tables.sql

          # Migration 2: Create indexes
          psql "${{ steps.create_neon_branch.outputs.db_url }}" -f schema/02-indexes.sql

          # Migration 3: Create strategic views (if exists in this branch)
          if [ -f schema/03-strategic-views.sql ]; then
            psql "${{ steps.create_neon_branch.outputs.db_url }}" -f schema/03-strategic-views.sql
          else
            echo "Skipping 03-strategic-views.sql (not in this branch yet)"
          fi

          echo "✅ All migrations completed successfully"

      - name: Load Test Data (Optional)
        run: |
          # Only load test data if the file exists
          if [ -f schema/test-data.sql ]; then
            echo "Loading test data for validation..."
            psql "${{ steps.create_neon_branch.outputs.db_url }}" -f schema/test-data.sql
            echo "✅ Test data loaded"
          else
            echo "No test data file found, skipping"
          fi
        continue-on-error: true  # Don't fail the workflow if test data has issues

      - name: Validate Schema
        run: |
          echo "Validating database schema..."
          psql "${{ steps.create_neon_branch.outputs.db_url }}" -c "\dt"
          psql "${{ steps.create_neon_branch.outputs.db_url }}" -c "\dv"
          echo "✅ Schema validation complete"

      - name: Post Schema Diff Comment to PR
        uses: neondatabase/schema-diff-action@v1
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          compare_branch: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}

  delete_neon_branch:
    name: Delete Neon Branch
    needs: setup
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
